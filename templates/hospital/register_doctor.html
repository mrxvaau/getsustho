{% extends 'base.html' %}
{% block title %}Register Doctor{% endblock %}
{% block content %}
<style>
body{background:#f1f5f9;padding:28px;font-family:'Segoe UI',sans-serif;}
.wrap{max-width:560px;margin:0 auto;}
.card{background:#fff;border-radius:16px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.07);}
h2{font-size:1.15rem;font-weight:800;color:#0f172a;margin-bottom:4px;}
.sub{color:#64748b;font-size:.78rem;margin-bottom:18px;}
label{font-size:.78rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:.84rem;outline:none;margin-bottom:12px;font-family:inherit;}
input:focus,select:focus{border-color:#0ea5e9;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:10px 22px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:9px;font-size:.84rem;font-weight:700;cursor:pointer;}
.back{display:inline-block;margin-bottom:14px;color:#0ea5e9;font-size:.8rem;font-weight:700;text-decoration:none;}
.info{background:#dbeafe;border-radius:9px;padding:10px 14px;font-size:.78rem;color:#1e40af;margin-bottom:18px;}
</style>
<div class="wrap">
  <a href="{% url 'hospital_dashboard' %}" class="back">← Dashboard</a>
  <div class="card">
    <h2>Register New Doctor</h2>
    <p class="sub">at {{ hospital.name }}</p>
    <div class="info">ℹ️ Auto-generated username, password & Doctor ID will be emailed to the doctor.</div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="row2">
        <div><label>First Name *</label><input type="text" name="first_name" required/></div>
        <div><label>Last Name</label><input type="text" name="last_name"/></div>
      </div>
      <label>Email * (credentials sent here)</label><input type="email" name="email" required/>
      <label>Phone *</label><input type="text" name="phone" required/>
      <label>Specialty *</label>
      <select name="specialist" required><option value="">— Select —</option>
        {% for val,lbl in form.fields.specialist.choices %}<option value="{{ val }}">{{ lbl }}</option>{% endfor %}
      </select>
      <label>Appointment Fee (৳) *</label><input type="number" name="appointment_fee" min="0" required/>
      <label>Profile Picture *</label><input type="file" name="profile_picture" accept="image/*" required/>
      <label>Bio</label><textarea name="bio" rows="3"></textarea>
      <button class="btn" type="submit">Register Doctor & Send Credentials</button>
    </form>
  </div>
</div>
{% endblock %}
