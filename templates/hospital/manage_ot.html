<div class="coming-soon-wrapper">
    <div class="coming-soon-card">
        <div class="icon">🚧</div>
        <h2>Feature Coming Soon</h2>
        <p>
            This feature will be available soon. We are currently working on it
            to provide a better and smoother experience.
        </p>
        <a href="javascript:history.back()" class="back-btn">Go Back</a>
    </div>
</div>

<style>
    .coming-soon-wrapper {
        min-height: 70vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f8fafc;
    }

    .coming-soon-card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border-radius: 18px;
        padding: 40px 28px;
        text-align: center;
        box-shadow: 0 12px 35px rgba(0, 0, 0, 0.08);
        border: 1px solid #e5e7eb;
    }

    .coming-soon-card .icon {
        font-size: 48px;
        margin-bottom: 16px;
    }

    .coming-soon-card h2 {
        font-size: 28px;
        margin-bottom: 12px;
        color: #111827;
        font-weight: 700;
    }

    .coming-soon-card p {
        font-size: 16px;
        line-height: 1.6;
        color: #6b7280;
        margin-bottom: 28px;
    }

    .back-btn {
        display: inline-block;
        padding: 12px 24px;
        background: #2563eb;
        color: #ffffff;
        text-decoration: none;
        border-radius: 10px;
        font-weight: 600;
        transition: 0.2s ease;
    }

    .back-btn:hover {
        background: #1d4ed8;
    }

    @media (max-width: 576px) {
        .coming-soon-wrapper {
            padding: 16px;
            min-height: 65vh;
        }

        .coming-soon-card {
            padding: 32px 20px;
            border-radius: 14px;
        }

        .coming-soon-card h2 {
            font-size: 23px;
        }

        .coming-soon-card p {
            font-size: 14px;
        }

        .back-btn {
            width: 100%;
            padding: 12px 18px;
        }
    }
</style>

{% endblock %}
