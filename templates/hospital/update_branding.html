{% extends 'base.html' %}
{% block title %}Hospital Profile{% endblock %}
{% block content %}
<style>
body{background:#f1f5f9;padding:28px;font-family:'Segoe UI',sans-serif;}
.wrap{max-width:680px;margin:0 auto;}
.card{background:#fff;border-radius:14px;padding:26px;border:1px solid #e2e8f0;margin-bottom:16px;}
h2{font-size:1.1rem;font-weight:800;color:#0f172a;margin-bottom:16px;}
label{font-size:.78rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;}
input,textarea{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:.84rem;outline:none;margin-bottom:12px;font-family:inherit;}
input:focus,textarea:focus{border-color:#0ea5e9;}
.btn{padding:10px 22px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:9px;font-size:.85rem;font-weight:700;cursor:pointer;}
.back{display:inline-block;margin-bottom:14px;color:#0ea5e9;font-size:.8rem;font-weight:700;text-decoration:none;}
.preview{width:80px;height:80px;border-radius:50%;object-fit:cover;border:3px solid #e2e8f0;margin-bottom:8px;display:block;}
.cover-preview{width:100%;height:140px;object-fit:cover;border-radius:10px;border:2px solid #e2e8f0;margin-bottom:8px;display:block;}
</style>
<div class="wrap">
  <a href="{% url 'hospital_dashboard' %}" class="back">← Dashboard</a>
  <div class="card">
    <h2>🏥 Hospital Profile & Branding</h2>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      <label>Hospital Logo</label>
      {% if branding.logo %}<img src="{{ branding.logo.url }}" class="preview"/>{% endif %}
      <input type="file" name="logo" accept="image/*" style="margin-bottom:14px;"/>
      <label>Cover Photo</label>
      {% if branding.cover_photo %}<img src="{{ branding.cover_photo.url }}" class="cover-preview"/>{% endif %}
      <input type="file" name="cover_photo" accept="image/*" style="margin-bottom:14px;"/>
      <label>Description</label>
      <textarea name="description" rows="4" placeholder="Describe your hospital, specialties, facilities…">{{ hospital.description }}</textarea>
      <label>Services (comma separated)</label>
      <input type="text" name="services" value="{{ hospital.services }}" placeholder="e.g. Emergency, Surgery, Pediatrics, ICU"/>
      <label>Phone</label>
      <input type="text" name="phone" value="{{ hospital.phone }}"/>
      <label>Website</label>
      <input type="url" name="website" value="{{ hospital.website }}" placeholder="https://"/>
      <button class="btn" type="submit">Save Changes</button>
    </form>
  </div>
</div>
{% endblock %}
