{% extends 'base.html' %}
{% block title %}Verify OTP{% endblock %}
{% block content %}
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0ea5e9,#6366f1);}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
h2{font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:4px;}
.sub{color:#64748b;font-size:.82rem;margin-bottom:16px;}
.info{background:#dbeafe;border-radius:9px;padding:10px 14px;font-size:.78rem;color:#1e40af;margin-bottom:18px;}
input{width:100%;padding:16px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:1.4rem;text-align:center;letter-spacing:.4em;font-weight:800;outline:none;margin-bottom:16px;}
input:focus{border-color:#0ea5e9;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;}
.back{text-align:center;margin-top:14px;font-size:.82rem;} .back a{color:#0ea5e9;font-weight:700;text-decoration:none;}
</style>
<div class="card">
  <h2>📬 Enter OTP</h2>
  <p class="sub">Check your email for the 6-digit code.</p>
  <div class="info">📧 Sent to <strong>{{ email }}</strong> — expires in 10 minutes.</div>
  <form method="post">{% csrf_token %}
    <input type="text" name="otp" maxlength="6" minlength="6" required autofocus placeholder="000000" pattern="[0-9]{6}" inputmode="numeric"/>
    <button class="btn" type="submit">Verify OTP →</button>
  </form>
  <div class="back"><a href="{% url 'forgot_password' %}">← Resend OTP</a></div>
</div>
{% endblock %}
