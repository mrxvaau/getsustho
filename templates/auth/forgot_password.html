{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#0ea5e9,#6366f1);}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
h2{font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:4px;}
.sub{color:#64748b;font-size:.82rem;margin-bottom:22px;}
label{font-size:.8rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.9rem;outline:none;margin-bottom:16px;}
input:focus{border-color:#0ea5e9;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;}
.back{text-align:center;margin-top:14px;font-size:.82rem;} .back a{color:#0ea5e9;font-weight:700;text-decoration:none;}
</style>
<div class="card">
  <h2>🔑 Forgot Password</h2>
  <p class="sub">Enter your email to receive a 6-digit OTP.</p>
  <form method="post">{% csrf_token %}
    <label>Email Address</label>
    <input type="email" name="email" required autofocus placeholder="your@email.com"/>
    <button class="btn" type="submit">Send OTP →</button>
  </form>
  <div class="back"><a href="{% url 'login' %}">← Back to Login</a></div>
</div>
{% endblock %}
