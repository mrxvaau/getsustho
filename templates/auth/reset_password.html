{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<style>
body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#10b981,#0ea5e9);}
.card{background:#fff;border-radius:20px;padding:40px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.15);}
h2{font-size:1.3rem;font-weight:800;color:#0f172a;margin-bottom:4px;}
.sub{color:#64748b;font-size:.82rem;margin-bottom:22px;}
label{font-size:.8rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;}
input{width:100%;padding:11px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:.9rem;outline:none;margin-bottom:16px;}
input:focus{border-color:#10b981;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#0ea5e9);color:#fff;border:none;border-radius:10px;font-size:.92rem;font-weight:700;cursor:pointer;}
</style>
<div class="card">
  <h2>🔒 Set New Password</h2>
  <p class="sub">Choose a strong password — minimum 8 characters.</p>
  <form method="post">{% csrf_token %}
    <label>New Password</label><input type="password" name="new_password1" required minlength="8"/>
    <label>Confirm Password</label><input type="password" name="new_password2" required minlength="8"/>
    {% if form.errors %}<p style="color:#dc2626;font-size:.76rem;margin-bottom:10px;">{{ form.errors }}</p>{% endif %}
    <button class="btn" type="submit">Reset Password ✓</button>
  </form>
</div>
{% endblock %}
