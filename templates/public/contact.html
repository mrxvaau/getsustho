{% extends 'base.html' %}
{% block title %}Contact — MediCare HMS{% endblock %}
{% block content %}
<style>
body{background:#f1f5f9;padding:28px;}
.wrap{max-width:560px;margin:0 auto;}
.card{background:#fff;border-radius:16px;padding:30px;border:1px solid #e2e8f0;}
h1{font-size:1.2rem;font-weight:800;color:#0f172a;margin-bottom:4px;}
.sub{color:#64748b;font-size:.8rem;margin-bottom:22px;}
label{font-size:.78rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;}
input,textarea{width:100%;padding:10px 13px;border:1.5px solid #e2e8f0;border-radius:9px;font-size:.85rem;outline:none;margin-bottom:13px;font-family:inherit;}
input:focus,textarea:focus{border-color:#0ea5e9;}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#0ea5e9,#6366f1);color:#fff;border:none;border-radius:10px;font-size:.9rem;font-weight:700;cursor:pointer;}
.back{display:inline-block;margin-bottom:16px;color:#0ea5e9;font-size:.82rem;font-weight:700;text-decoration:none;}
</style>
<div class="wrap">
  <a href="{% url 'landing' %}" class="back">← Home</a>
  <div class="card">
    <h1>Contact Us</h1>
    <p class="sub">We'll get back to you within 24 hours.</p>
    <form method="post">
      {% csrf_token %}
      <label>Name</label><input type="text" name="name" required/>
      <label>Email</label><input type="email" name="email" required/>
      <label>Phone</label><input type="text" name="phone"/>
      <label>Message</label><textarea name="message" rows="5" required></textarea>
      <button class="btn" type="submit">Send Message</button>
    </form>
  </div>
</div>
{% endblock %}
