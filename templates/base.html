<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>{% block title %}MediCare HMS{% endblock %}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#334155;}
.msg-list{position:fixed;top:16px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;max-width:340px;}
.msg{padding:12px 18px;border-radius:10px;font-size:.84rem;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.12);animation:fadeIn .3s;}
.msg-success{background:#dcfce7;color:#166534;}
.msg-error{background:#fee2e2;color:#991b1b;}
.msg-info{background:#dbeafe;color:#1e40af;}
.msg-warning{background:#fef9c3;color:#a16207;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
{% if messages %}
<div class="msg-list">
  {% for m in messages %}
  <div class="msg msg-{{ m.tags }}">{{ m }}</div>
  {% endfor %}
</div>
<script>setTimeout(()=>{document.querySelectorAll('.msg').forEach(e=>e.remove())},4500)</script>
{% endif %}
{% block content %}{% endblock %}
</body>
</html>
