{% extends 'base.html' %}
{% block title %}Walk-in Booking{% endblock %}
{% block content %}
<style>
:root{--blue:#0ea5e9;--indigo:#6366f1;--dark:#0f172a;--muted:#64748b;--light:#f1f5f9;--border:#e2e8f0;--white:#fff;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{background:var(--light);padding:28px;}
.wrap{max-width:620px;margin:0 auto;}
.back{display:inline-block;margin-bottom:16px;color:var(--blue);font-size:.82rem;font-weight:700;text-decoration:none;}
.card{background:var(--white);border-radius:14px;padding:26px;border:1px solid var(--border);}
h2{font-size:1.1rem;font-weight:800;color:var(--dark);margin-bottom:18px;}
label{font-size:.78rem;font-weight:700;color:#475569;display:block;margin-bottom:4px;}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:.84rem;outline:none;margin-bottom:12px;font-family:inherit;}
input:focus,select:focus{border-color:var(--blue);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tab-btns{display:flex;gap:10px;margin-bottom:18px;}
.tab-btn{flex:1;padding:10px;border:2px solid var(--border);border-radius:9px;background:#fff;font-weight:700;font-size:.82rem;cursor:pointer;color:var(--muted);transition:.2s;}
.tab-btn.active{border-color:var(--blue);color:var(--blue);background:#eff6ff;}
.pane{display:none;} .pane.active{display:block;}
.btn{padding:10px 22px;background:linear-gradient(135deg,var(--blue),var(--indigo));color:#fff;border:none;border-radius:9px;font-size:.85rem;font-weight:700;cursor:pointer;}
.info-note{background:#dcfce7;border-radius:9px;padding:9px 13px;font-size:.76rem;color:#166534;margin-bottom:12px;}
</style>
<div class="wrap">
  <a href="{% url 'staff_dashboard' %}" class="back">← Staff Dashboard</a>
  <div class="card">
    <h2>➕ Walk-in Booking</h2>
    <div class="tab-btns">
      <button class="tab-btn active" onclick="switchTab('existing',this)">👤 Existing Patient</button>
      <button class="tab-btn" onclick="switchTab('new',this)">➕ New Patient</button>
    </div>

    <div class="pane active" id="pane-existing">
      <form method="post">
        {% csrf_token %}<input type="hidden" name="booking_type" value="existing"/>
        <label>Doctor *</label>
        <select name="doctor_id" required>
          <option value="">— Select Doctor —</option>
          {% for d in doctors %}<option value="{{ d.pk }}">{{ d }}</option>{% endfor %}
        </select>
        <label>Patient ID *</label>
        <input type="text" name="patient_id" placeholder="PAT-0001" required/>
        <label>Symptoms</label>
        <textarea name="symptoms" rows="3"></textarea>
        <button class="btn" type="submit">Book Appointment</button>
      </form>
    </div>

    <div class="pane" id="pane-new">
      <form method="post">
        {% csrf_token %}<input type="hidden" name="booking_type" value="new"/>
        <label>Doctor *</label>
        <select name="doctor_id" required>
          <option value="">— Select Doctor —</option>
          {% for d in doctors %}<option value="{{ d.pk }}">{{ d }}</option>{% endfor %}
        </select>
        <div class="row2">
          <div><label>First Name *</label><input type="text" name="first_name" required/></div>
          <div><label>Last Name</label><input type="text" name="last_name"/></div>
        </div>
        <label>Email * (credentials sent here)</label>
        <input type="email" name="email" required/>
        <div class="row2">
          <div><label>Phone *</label><input type="text" name="phone" required/></div>
          <div><label>Age</label><input type="number" name="age" min="0"/></div>
        </div>
        <label>Symptoms</label>
        <textarea name="symptoms" rows="3"></textarea>
        <div class="info-note">✅ Auto-generated credentials will be emailed to the patient.</div>
        <button class="btn" type="submit">Register & Book</button>
      </form>
    </div>
  </div>
</div>
<script>
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('pane-'+tab).classList.add('active');
}
</script>
{% endblock %}
